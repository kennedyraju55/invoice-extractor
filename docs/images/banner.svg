<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b5179e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="16" fill="url(#bgGrad)"/>

  <!-- Accent border -->
  <rect x="2" y="2" width="896" height="246" rx="15" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Decorative circles -->
  <circle cx="780" cy="50" r="80" fill="#7209b7" opacity="0.08"/>
  <circle cx="820" cy="180" r="60" fill="#b5179e" opacity="0.06"/>
  <circle cx="100" cy="200" r="50" fill="#7209b7" opacity="0.06"/>

  <!-- Invoice icon -->
  <g transform="translate(80, 60)" filter="url(#glow)">
    <rect x="0" y="0" width="60" height="78" rx="6" fill="none" stroke="#7209b7" stroke-width="2.5"/>
    <rect x="0" y="0" width="60" height="20" rx="6" fill="#7209b7" opacity="0.3"/>
    <line x1="12" y1="32" x2="48" y2="32" stroke="#7209b7" stroke-width="2" opacity="0.6"/>
    <line x1="12" y1="42" x2="42" y2="42" stroke="#7209b7" stroke-width="2" opacity="0.4"/>
    <line x1="12" y1="52" x2="38" y2="52" stroke="#7209b7" stroke-width="2" opacity="0.4"/>
    <line x1="12" y1="62" x2="48" y2="62" stroke="#7209b7" stroke-width="2" opacity="0.6"/>
    <text x="30" y="14" text-anchor="middle" fill="#e0e0e0" font-family="Segoe UI Emoji, Arial" font-size="11">🧾</text>
  </g>

  <!-- Title -->
  <text x="180" y="105" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="44" letter-spacing="-1">
    Invoice Extractor
  </text>

  <!-- Tagline -->
  <text x="180" y="142" fill="#c4b5d0" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="17" letter-spacing="0.5">
    AI-Powered Invoice Parsing, Batch Processing &amp; Duplicate Detection
  </text>

  <!-- Tech badges -->
  <g transform="translate(180, 165)">
    <!-- Gemma 4 badge -->
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#7209b7" opacity="0.25"/>
    <rect x="0" y="0" width="90" height="28" rx="14" fill="none" stroke="#7209b7" stroke-width="1"/>
    <text x="45" y="18" text-anchor="middle" fill="#d4a5f0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Gemma 4</text>

    <!-- Ollama badge -->
    <rect x="100" y="0" width="80" height="28" rx="14" fill="#7209b7" opacity="0.15"/>
    <rect x="100" y="0" width="80" height="28" rx="14" fill="none" stroke="#7209b7" stroke-width="1" opacity="0.6"/>
    <text x="140" y="18" text-anchor="middle" fill="#c4a0e0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Ollama</text>

    <!-- Python badge -->
    <rect x="190" y="0" width="88" height="28" rx="14" fill="#7209b7" opacity="0.15"/>
    <rect x="190" y="0" width="88" height="28" rx="14" fill="none" stroke="#7209b7" stroke-width="1" opacity="0.6"/>
    <text x="234" y="18" text-anchor="middle" fill="#c4a0e0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Python 3.9+</text>

    <!-- CLI badge -->
    <rect x="288" y="0" width="66" height="28" rx="14" fill="#7209b7" opacity="0.15"/>
    <rect x="288" y="0" width="66" height="28" rx="14" fill="none" stroke="#7209b7" stroke-width="1" opacity="0.6"/>
    <text x="321" y="18" text-anchor="middle" fill="#c4a0e0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">CLI</text>

    <!-- Private badge -->
    <rect x="364" y="0" width="100" height="28" rx="14" fill="#7209b7" opacity="0.15"/>
    <rect x="364" y="0" width="100" height="28" rx="14" fill="none" stroke="#7209b7" stroke-width="1" opacity="0.6"/>
    <text x="414" y="18" text-anchor="middle" fill="#c4a0e0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">100% Private</text>
  </g>

  <!-- Accent line -->
  <rect x="180" y="205" width="120" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.7"/>
</svg>
