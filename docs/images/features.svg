<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="featBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="featAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b5179e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" rx="14" fill="url(#featBg)"/>
  <rect x="2" y="2" width="796" height="346" rx="13" fill="none" stroke="url(#featAccent)" stroke-width="1.5" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="18" letter-spacing="0.5">Features at a Glance</text>
  <rect x="310" y="42" width="180" height="2" rx="1" fill="url(#featAccent)" opacity="0.5"/>

  <!-- ===== Row 1 ===== -->

  <!-- Feature 1: Structured Extraction -->
  <g transform="translate(30, 65)">
    <rect x="0" y="0" width="235" height="115" rx="10" fill="#1a1a2e" stroke="#7209b7" stroke-width="1.2"/>
    <circle cx="30" cy="30" r="18" fill="#7209b7" opacity="0.15"/>
    <text x="30" y="36" text-anchor="middle" fill="#d4a5f0" font-family="Segoe UI Emoji, Arial" font-size="16">📋</text>
    <text x="58" y="34" fill="#e0e0e0" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="13">Structured Extraction</text>
    <text x="20" y="56" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Vendor name, address, phone, email.</text>
    <text x="20" y="70" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Invoice dates in ISO 8601 format.</text>
    <text x="20" y="84" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Line items with qty, price, total.</text>
    <text x="20" y="98" fill="#777" font-family="Segoe UI, Arial, sans-serif" font-size="10">Subtotal, tax, and grand total.</text>
  </g>

  <!-- Feature 2: Batch Processing -->
  <g transform="translate(283, 65)">
    <rect x="0" y="0" width="235" height="115" rx="10" fill="#1a1a2e" stroke="#7209b7" stroke-width="1.2"/>
    <circle cx="30" cy="30" r="18" fill="#7209b7" opacity="0.15"/>
    <text x="30" y="36" text-anchor="middle" fill="#d4a5f0" font-family="Segoe UI Emoji, Arial" font-size="16">⚡</text>
    <text x="58" y="34" fill="#e0e0e0" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="13">Batch Processing</text>
    <text x="20" y="56" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Process multiple invoices at once.</text>
    <text x="20" y="70" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Graceful error handling per file.</text>
    <text x="20" y="84" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Returns {file, data} or {file, error}.</text>
    <text x="20" y="98" fill="#777" font-family="Segoe UI, Arial, sans-serif" font-size="10">Export all results in one command.</text>
  </g>

  <!-- Feature 3: Duplicate Detection -->
  <g transform="translate(536, 65)">
    <rect x="0" y="0" width="235" height="115" rx="10" fill="#1a1a2e" stroke="#7209b7" stroke-width="1.2"/>
    <circle cx="30" cy="30" r="18" fill="#7209b7" opacity="0.15"/>
    <text x="30" y="36" text-anchor="middle" fill="#d4a5f0" font-family="Segoe UI Emoji, Arial" font-size="16">🔁</text>
    <text x="58" y="34" fill="#e0e0e0" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="13">Duplicate Detection</text>
    <text x="20" y="56" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Smart similarity matching.</text>
    <text x="20" y="70" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Configurable threshold (default 0.9).</text>
    <text x="20" y="84" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Returns index pairs with reasons.</text>
    <text x="20" y="98" fill="#777" font-family="Segoe UI, Arial, sans-serif" font-size="10">Prevents duplicate payments.</text>
  </g>

  <!-- ===== Row 2 ===== -->

  <!-- Feature 4: Item Categorization -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="235" height="115" rx="10" fill="#1a1a2e" stroke="#7209b7" stroke-width="1.2"/>
    <circle cx="30" cy="30" r="18" fill="#7209b7" opacity="0.15"/>
    <text x="30" y="36" text-anchor="middle" fill="#d4a5f0" font-family="Segoe UI Emoji, Arial" font-size="16">🏷️</text>
    <text x="58" y="34" fill="#e0e0e0" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="13">Item Categorization</text>
    <text x="20" y="56" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">AI-powered line item tagging.</text>
    <text x="20" y="70" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Automatic expense categories.</text>
    <text x="20" y="84" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Uses Gemma 4 for classification.</text>
    <text x="20" y="98" fill="#777" font-family="Segoe UI, Arial, sans-serif" font-size="10">Custom categories via config.</text>
  </g>

  <!-- Feature 5: Multi-Format Export -->
  <g transform="translate(283, 200)">
    <rect x="0" y="0" width="235" height="115" rx="10" fill="#1a1a2e" stroke="#7209b7" stroke-width="1.2"/>
    <circle cx="30" cy="30" r="18" fill="#7209b7" opacity="0.15"/>
    <text x="30" y="36" text-anchor="middle" fill="#d4a5f0" font-family="Segoe UI Emoji, Arial" font-size="16">📊</text>
    <text x="58" y="34" fill="#e0e0e0" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="13">Multi-Format Export</text>
    <text x="20" y="56" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">JSON for structured data.</text>
    <text x="20" y="70" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">CSV for spreadsheet workflows.</text>
    <text x="20" y="84" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Rich table for terminal display.</text>
    <text x="20" y="98" fill="#777" font-family="Segoe UI, Arial, sans-serif" font-size="10">--output json | csv | table</text>
  </g>

  <!-- Feature 6: 100% Private -->
  <g transform="translate(536, 200)">
    <rect x="0" y="0" width="235" height="115" rx="10" fill="#1a1a2e" stroke="#7209b7" stroke-width="1.2"/>
    <circle cx="30" cy="30" r="18" fill="#7209b7" opacity="0.15"/>
    <text x="30" y="36" text-anchor="middle" fill="#d4a5f0" font-family="Segoe UI Emoji, Arial" font-size="16">🔒</text>
    <text x="58" y="34" fill="#e0e0e0" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="13">100% Private</text>
    <text x="20" y="56" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">All processing stays on your machine.</text>
    <text x="20" y="70" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">No cloud APIs or external calls.</text>
    <text x="20" y="84" fill="#999" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">Financial data never leaves local.</text>
    <text x="20" y="98" fill="#777" font-family="Segoe UI, Arial, sans-serif" font-size="10">Powered by Ollama + Gemma 4.</text>
  </g>
</svg>
